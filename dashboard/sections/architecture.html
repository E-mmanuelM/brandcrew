<html lang="en">
<head>
<meta charset="UTF-8">

<title>BrandCrew — Architecture Map</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap');

  :root {
    --bg: #F0EBE0;
    --bg-alt: #E8E3D8;
    --bg-panel: #FAF7F2;
    --bg-map: #EDEAE2;
    --fg: #1A1A1A;
    --fg-secondary: #6B6560;
    --fg-dim: #A09A93;
    --accent-green: #5CBF3A;
    --accent-red: #C44B28;
    --mark-stroke: #1A1A1A;
    --connection: #C5BFB6;
    --connection-hover: #1A1A1A;
    --border: #D6D1C8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--fg);
    font-family: 'IBM Plex Mono', monospace;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
    height: 100vh;
  }

  .map-container {
    width: 100%;
    height: 100vh;
    position: relative;
    background: var(--bg-map);
    overflow: hidden;
  }

  #bgCanvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #mapSvg {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1;
  }

  .conn-line {
    stroke: var(--connection);
    stroke-width: 1;
    fill: none;
    transition: stroke 0.3s ease, stroke-opacity 0.3s ease;
  }

  .conn-line.data-flow { stroke-dasharray: 4 4; }
  .conn-line.dimmed { stroke-opacity: 0.15; }
  .conn-line.highlighted { stroke: var(--connection-hover); stroke-width: 1.5; stroke-opacity: 1; }
  .conn-line.highlighted.data-flow { stroke-dasharray: 6 3; }

  .node-group { cursor: pointer; }
  .node-group.dimmed { opacity: 0.2; }
  .node-group .node-bg { fill: transparent; }
  .node-group:hover .node-bg { fill: rgba(237,234,226,0.92); }

  .node-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8px;
    font-weight: 500;
    fill: var(--fg-dim);
    letter-spacing: 2px;
    text-anchor: middle;
  }

  .node-name-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 400;
    fill: var(--fg);
    text-anchor: middle;
  }

  .zone-text {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    font-weight: 500;
    fill: var(--fg-dim);
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  .zone-rect { display: none; }

  .panel-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(26,26,26,0.06);
    z-index: 200; opacity: 0; pointer-events: none;
    transition: opacity 0.3s ease;
  }
  .panel-overlay.visible { opacity: 1; pointer-events: auto; }

  .detail-panel {
    position: fixed; right: -440px; top: 0;
    width: 420px; height: 100vh;
    background: var(--bg-panel);
    border-left: 1px solid var(--border);
    z-index: 300; padding: 0;
    overflow-y: auto;
    transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .detail-panel.visible { right: 0; }

  .panel-header {
    padding: 28px 28px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .panel-close {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px; background: none;
    border: 1px solid var(--fg-dim); color: var(--fg-dim);
    cursor: pointer; padding: 4px 10px; letter-spacing: 1px;
  }
  .panel-close:hover { border-color: var(--fg); color: var(--fg); }

  .panel-mark { width: 52px; height: 52px; margin-bottom: 12px; }
  .panel-mark svg { width: 52px; height: 52px; }

  .panel-code {
    font-size: 9px; font-weight: 500; letter-spacing: 3px; color: var(--fg-dim);
  }

  .panel-title {
    font-size: 13px; font-weight: 500; letter-spacing: 0.5px; margin-top: 4px;
  }

  .panel-body { padding: 0; }

  .panel-row {
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 12px;
  }

  .panel-row-label {
    font-size: 9px; font-weight: 500; letter-spacing: 2px;
    text-transform: uppercase; color: var(--fg-dim); padding-top: 2px;
  }

  .panel-row-value {
    font-size: 10px; font-weight: 300; line-height: 1.7; color: var(--fg-secondary);
  }

  .panel-tag {
    display: inline-block; font-size: 9px; font-weight: 400; letter-spacing: 0.5px;
    padding: 2px 8px; border: 1px solid var(--border); margin: 2px 4px 2px 0;
  }

  .panel-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 10px; font-weight: 400;
  }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; }
  .status-dot.active { background: var(--accent-green); }
  .status-dot.idle { background: var(--fg-dim); }

  .legend {
    position: fixed; bottom: 20px; left: 24px; z-index: 50;
    display: flex; gap: 20px;
    font-size: 8px; color: var(--fg-dim); letter-spacing: 1.5px; text-transform: uppercase;
  }

  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-swatch { width: 16px; height: 0; }
  .legend-swatch.solid { border-top: 1px solid var(--fg-dim); }
  .legend-swatch.dashed { border-top: 1px dashed var(--fg-dim); }

  .map-info {
    position: fixed; bottom: 20px; right: 24px; z-index: 50;
    font-size: 8px; color: var(--fg-dim); letter-spacing: 1.5px; text-transform: uppercase;
    text-align: right; line-height: 1.8;
  }
</style>
</head>

  pt01: `<ellipse cx="24" cy="24" rx="16" ry="10" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><circle cx="24" cy="24" r="5" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><circle cx="24" cy="24" r="2" fill="#1A1A1A"/>`,
  pt02: `<line x1="12" y1="38" x2="12" y2="22" stroke="#1A1A1A" stroke-width="3"/><line x1="20" y1="38" x2="20" y2="14" stroke="#1A1A1A" stroke-width="3"/><line x1="28" y1="38" x2="28" y2="26" stroke="#1A1A1A" stroke-width="3"/><line x1="36" y1="38" x2="36" y2="10" stroke="#1A1A1A" stroke-width="3"/><line x1="6" y1="38" x2="42" y2="38" stroke="#1A1A1A" stroke-width="1"/>`,
  pt03: `<circle cx="24" cy="24" r="14" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><line x1="24" y1="6" x2="24" y2="42" stroke="#1A1A1A" stroke-width="1"/><line x1="6" y1="24" x2="42" y2="24" stroke="#1A1A1A" stroke-width="1"/><circle cx="24" cy="24" r="2" fill="#1A1A1A"/>`,
  pt04: `<polygon points="24,6 42,24 24,42 6,24" stroke="#1A1A1A" stroke-width="1.5" fill="none"/><polygon points="24,16 32,24 24,32 16,24" stroke="#1A1A1A" stroke-width="1" fill="none"/><circle cx="24" cy="24" r="2" fill="#1A1A1A"/>`,
};

// RENDER
const svg = document.getElementById('mapSvg');
const W = 1200, H = 680;
svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
const ox = 20, oy = 20;

const zoneGroups = {
  'FULL-TIME PIPELINE': ['ft01','ft02','ft03','ft04','ft05','ft06','ft07'],
  'HUMAN + COMMS': ['hu01','ch01','ch02','ch03'],
  'DATA STORES': ['ds01','ds02','ds03'],
  'SHARED KNOWLEDGE': ['sk01','sk02','sk03','sk04','sk05','sk06'],
  'PART-TIME INTELLIGENCE': ['pt01','pt02','pt03','pt04'],
};

function addZoneLabel(x, y, text) {
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', x + ox); t.setAttribute('y', y + oy);
  t.setAttribute('class','zone-text');
  t.textContent = text;
  t.style.cursor = 'pointer';
  t.addEventListener('mouseenter', () => highlightGroup(text));
  t.addEventListener('mouseleave', () => clearHighlights());
  svg.appendChild(t);
}

function highlightGroup(zoneName) {
  const groupIds = zoneGroups[zoneName] || [];
  if (!groupIds.length) return;
  Object.values(nodeEls).forEach(el => el.classList.add('dimmed'));
  connEls.forEach(el => { el.classList.add('dimmed'); el.classList.remove('highlighted'); });
  groupIds.forEach(id => nodeEls[id]?.classList.remove('dimmed'));
  connEls.forEach(el => {
    if (groupIds.includes(el.dataset.from) && groupIds.includes(el.dataset.to)) {
      el.classList.remove('dimmed');
      el.classList.add('highlighted');
    }
  });
}

addZoneLabel(100, 148, 'FULL-TIME PIPELINE');
addZoneLabel(750, 148, 'HUMAN + COMMS');
addZoneLabel(750, 540, 'DATA STORES');
addZoneLabel(100, 490, 'SHARED KNOWLEDGE');
addZoneLabel(100, 10, 'PART-TIME INTELLIGENCE');

// Draw connections
const connEls = [];
connections.forEach(c => {
  const from = nodes.find(n => n.id === c.from);
  const to = nodes.find(n => n.id === c.to);
  if (!from || !to) return;

  const x1 = from.x + ox, y1 = from.y + oy;
  const x2 = to.x + ox, y2 = to.y + oy;

  const dx = x2 - x1, dy = y2 - y1;
  const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
  const dist = Math.sqrt(dx*dx + dy*dy);
  const curve = dist * 0.15;
  const nx = -dy / dist * curve, ny = dx / dist * curve;

  const path = document.createElementNS('http://www.w3.org/2000/svg','path');
  path.setAttribute('d', `M ${x1} ${y1} Q ${mx + nx} ${my + ny} ${x2} ${y2}`);
  path.setAttribute('class', `conn-line ${c.type === 'data' ? 'data-flow' : ''}`);
  path.dataset.from = c.from;
  path.dataset.to = c.to;
  svg.appendChild(path);
  connEls.push(path);
});

// Draw nodes
const nodeEls = {};
nodes.forEach(n => {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('class','node-group');
  g.dataset.id = n.id;
  g.setAttribute('transform', `translate(${n.x + ox - 24}, ${n.y + oy - 24})`);

  const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
  bg.setAttribute('class','node-bg');
  bg.setAttribute('x','-8'); bg.setAttribute('y','-4');
  bg.setAttribute('width','64'); bg.setAttribute('height','72');
  bg.setAttribute('rx','2');
  g.appendChild(bg);

  const markG = document.createElementNS('http://www.w3.org/2000/svg','g');
  markG.innerHTML = marks[n.id] || '';
  g.appendChild(markG);

  if (n.status === 'active') {
    const dot = document.createElementNS('http://www.w3.org/2000/svg','circle');
    dot.setAttribute('cx','42'); dot.setAttribute('cy','6'); dot.setAttribute('r','3');
    dot.setAttribute('fill', '#5CBF3A');
    g.appendChild(dot);
  }

  const code = document.createElementNS('http://www.w3.org/2000/svg','text');
  code.setAttribute('class','node-label');
  code.setAttribute('x','24'); code.setAttribute('y','56');
  code.textContent = n.code;
  g.appendChild(code);

  const name = document.createElementNS('http://www.w3.org/2000/svg','text');
  name.setAttribute('class','node-name-label');
  name.setAttribute('x','24'); name.setAttribute('y','66');
  name.textContent = n.name;
  g.appendChild(name);

  g.addEventListener('mouseenter', () => highlightNode(n.id));
  g.addEventListener('mouseleave', () => clearHighlights());
  g.addEventListener('click', () => showPanel(n.id));

  svg.appendChild(g);
  nodeEls[n.id] = g;
});

// INTERACTIONS
let selectedNode = null;

function highlightNode(id) {
  Object.values(nodeEls).forEach(el => el.classList.add('dimmed'));
  connEls.forEach(el => { el.classList.add('dimmed'); el.classList.remove('highlighted'); });
  nodeEls[id]?.classList.remove('dimmed');
  const connected = new Set();
  connected.add(id);
  connEls.forEach(el => {
    if (el.dataset.from === id || el.dataset.to === id) {
      el.classList.remove('dimmed');
      el.classList.add('highlighted');
      connected.add(el.dataset.from);
      connected.add(el.dataset.to);
    }
  });
  connected.forEach(cid => nodeEls[cid]?.classList.remove('dimmed'));
}

function clearHighlights() {
  if (selectedNode) return;
  Object.values(nodeEls).forEach(el => el.classList.remove('dimmed'));
  connEls.forEach(el => { el.classList.remove('dimmed'); el.classList.remove('highlighted'); });
}

function showPanel(id) {
  const n = nodes.find(nn => nn.id === id);
  const d = nodeData[id];
  if (!n || !d) return;

  selectedNode = id;
  highlightNode(id);

  document.getElementById('panelMark').innerHTML = `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">${marks[id]}</svg>`;
  document.getElementById('panelCode').textContent = n.code;
  document.getElementById('panelTitle').textContent = n.name;

  let html = '';
  const statusClass = n.status === 'active' ? 'active' : 'idle';
  html += `<div class="panel-row"><div class="panel-row-label">Status</div><div class="panel-row-value"><div class="panel-status"><div class="status-dot ${statusClass}"></div>${n.status}</div></div></div>`;
  if (d.schedule) html += `<div class="panel-row"><div class="panel-row-label">Schedule</div><div class="panel-row-value">${d.schedule}</div></div>`;
  if (d.desc) html += `<div class="panel-row"><div class="panel-row-label">About</div><div class="panel-row-value">${d.desc}</div></div>`;
  if (d.reads?.length) html += `<div class="panel-row"><div class="panel-row-label">Reads</div><div class="panel-row-value">${d.reads.map(r=>`<span class="panel-tag">${r}</span>`).join('')}</div></div>`;
  if (d.writes?.length) html += `<div class="panel-row"><div class="panel-row-label">Writes</div><div class="panel-row-value">${d.writes.map(w=>`<span class="panel-tag">${w}</span>`).join('')}</div></div>`;

  document.getElementById('panelBody').innerHTML = html;
  document.getElementById('detailPanel').classList.add('visible');
  document.getElementById('panelOverlay').classList.add('visible');
}

function hidePanel() {
  selectedNode = null;
  document.getElementById('detailPanel').classList.remove('visible');
  document.getElementById('panelOverlay').classList.remove('visible');
  clearHighlights();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') hidePanel(); });

// Background particles
(function() {
  const c = document.getElementById('bgCanvas');
  const ctx = c.getContext('2d');
  function resize() { c.width = c.parentElement.clientWidth; c.height = c.parentElement.clientHeight; }
  resize();
  window.addEventListener('resize', resize);

  const particles = [];
  for (let i = 0; i < 200; i++) {
    particles.push({
      x: Math.random(), y: Math.random(),
      vx: (Math.random()-0.5)*0.0002, vy: (Math.random()-0.5)*0.0002,
      size: Math.random()*1.2+0.3, phase: Math.random()*Math.PI*2
    });
  }

  let t = 0;
  function draw() {
    const w = c.width, h = c.height;
    ctx.clearRect(0,0,w,h);
    for (const p of particles) {
      p.x += p.vx + Math.sin(t*0.5+p.phase)*0.00005;
      p.y += p.vy + Math.cos(t*0.3+p.phase)*0.00005;
      if(p.x<0)p.x=1; if(p.x>1)p.x=0; if(p.y<0)p.y=1; if(p.y>1)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x*w, p.y*h, p.size, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(26,26,26,0.06)';
      ctx.fill();
    }
    t+=0.02;
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
