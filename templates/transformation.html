<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* FONT_IMPORT */
/* THEME_VARIABLES */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1350px;
  background: var(--bg-cream);
  font-family: var(--font-body);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 50px;
}

.headline {
  font-family: var(--font-display);
  font-weight: 900;
  font-style: italic;
  font-size: 52px;
  color: var(--text-on-light);
  text-align: center;
  margin-bottom: 32px;
  line-height: 1.1;
  max-width: 920px;
}

.panels {
  width: 960px;
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 0;
  position: relative;
}

.panel {
  flex: 1;
  border-radius: var(--card-radius);
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.panel.before {
  background: var(--bad-bg);
  color: var(--text-on-dark);
  border-bottom-left-radius: 0;
  border-bottom-right-radius: 0;
}
.panel.after {
  background: var(--forest);
  color: var(--text-on-dark);
  border-top-left-radius: 0;
  border-top-right-radius: 0;
}

.verdict {
  font-size: 15px;
  letter-spacing: 4px;
  text-transform: uppercase;
  font-weight: 700;
  margin-bottom: 12px;
}
.panel.before .verdict { color: var(--accent-coral); }
.panel.after .verdict { color: var(--sage); }

.panel-title {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 36px;
  margin-bottom: 24px;
  line-height: 1.15;
}

.items { display: flex; flex-direction: column; gap: 14px; }
.item {
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 22px;
  line-height: 1.3;
}
.item-icon {
  width: 36px;
  height: 36px;
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 17px;
  flex-shrink: 0;
  font-weight: 700;
}
.panel.before .item-icon {
  background: rgba(212,131,107,0.2);
  color: var(--accent-coral);
}
.panel.after .item-icon {
  background: rgba(107,184,154,0.2);
  color: var(--sage);
}

.arrow-bridge {
  width: 100%;
  display: flex;
  justify-content: center;
  z-index: 2;
  margin: -1px 0;
}
</style>
</head>
<body>
<div class="headline">{{headline}}</div>
<div class="panels">
  <div class="panel before">
    <div class="verdict">{{before_verdict}}</div>
    <div class="panel-title">{{before_title}}</div>
    <div class="items">
      <!-- REPEAT:before_items -->
      <div class="item"><div class="item-icon">✕</div> {{item}}</div>
      <!-- END:before_items -->
    </div>
  </div>
  <div class="arrow-bridge">
    <svg width="56" height="44" viewBox="0 0 56 44"><polygon points="28,44 4,14 18,14 18,0 38,0 38,14 52,14" fill="#6BB89A"/></svg>
  </div>
  <div class="panel after">
    <div class="verdict">{{after_verdict}}</div>
    <div class="panel-title">{{after_title}}</div>
    <div class="items">
      <!-- REPEAT:after_items -->
      <div class="item"><div class="item-icon">✓</div> {{item}}</div>
      <!-- END:after_items -->
    </div>
  </div>
</div>
</body>
</html>
