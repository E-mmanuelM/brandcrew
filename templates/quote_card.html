<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
/* FONT_IMPORT */
/* THEME_VARIABLES */

* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  width: 1080px;
  height: 1350px;
  background: var(--bg-cream);
  font-family: var(--font-body);
  display: flex;
  align-items: center;
  justify-content: center;
}

.outer {
  width: 920px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.quote-mark {
  font-family: var(--font-display);
  font-size: 180px;
  color: var(--forest);
  opacity: 0.12;
  line-height: 0.6;
  margin-bottom: -25px;
}

.card {
  width: 100%;
  background: var(--forest);
  border-radius: var(--card-radius);
  padding: 60px 55px;
}

.quote-text {
  font-family: var(--font-display);
  font-weight: 900;
  font-style: italic;
  font-size: 44px;
  color: var(--text-on-dark);
  line-height: 1.2;
  margin-bottom: 35px;
}
.quote-text .accent {
  color: var(--accent-lilac);
}

.divider {
  width: 70px;
  height: 3px;
  background: var(--sage);
  margin-bottom: 25px;
}

.context {
  font-size: 19px;
  color: var(--text-muted);
  line-height: 1.6;
  margin-bottom: 28px;
}

.tag-row {
  display: flex;
  gap: 10px;
}
.tag {
  background: var(--forest-deep);
  color: var(--sage);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  padding: 9px 18px;
  border-radius: 8px;
}
</style>
</head>
<body>
<div class="outer">
  <div class="quote-mark">"</div>
  <div class="card">
    <div class="quote-text">{{quote}}</div>
    <div class="divider"></div>
    <div class="context">{{context}}</div>
    <div class="tag-row">
      <!-- REPEAT:tags -->
      <div class="tag">{{item}}</div>
      <!-- END:tags -->
    </div>
  </div>
</div>
</body>
</html>
